name: Curate catalog

on:
  schedule:
    # Daily at 07:00 UTC (= 00:00 PDT / 23:00 PST). Catalog runs first in the overnight slot.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Scope this run to one category (or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - chemistry
          - immunology-microbiology
          - structural-computational-biology
          - molecular-cellular-biology
          - neuroscience
          - translational-medicine
          - drug-repurposing-discovery

permissions:
  contents: write
  issues: write

concurrency:
  group: curate
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compose run prompt
        run: |
          SCOPE="${{ inputs.category }}"
          SCOPE="${SCOPE:-all}"

          # Derive today's focus category from the UTC weekday (1=Mon … 7=Sun).
          # Used by the directed-pass procedure described under
          # "Topic-focused rotation" in AGENT.md.
          DOW=$(date -u +%u)
          case "${DOW}" in
            1) FOCUS="Chemistry" ;;
            2) FOCUS="Immunology and Microbiology" ;;
            3) FOCUS="Integrative Structural and Computational Biology" ;;
            4) FOCUS="Molecular and Cellular Biology" ;;
            5) FOCUS="Neuroscience" ;;
            6) FOCUS="Translational Medicine" ;;
            7) FOCUS="Drug Repurposing and Discovery" ;;
          esac

          {
            cat AGENT.md
            echo ""
            echo "---"
            echo ""
            echo "## This run"
            echo "- UTC date: $(date -u +%Y-%m-%d)"
            echo "- Scope: ${SCOPE}"
            echo "- focus_category: ${FOCUS}"
            if [ "${SCOPE}" = "all" ]; then
              echo "- Run the manifest sweep AND the directed pass for the focus category. Update any per-tool pages under \`catalog/tools/\` as warranted, plus \`CHANGELOG.md\` per your instructions."
            else
              echo "- Limit edits to tool pages whose front-matter \`tool_categories\` includes \"${SCOPE}\" (plus \`CHANGELOG.md\` per your instructions). When \`${SCOPE}\` matches \`${FOCUS}\`, run the directed pass; otherwise rely on the manifest sweep filtered to this category."
            fi
          } > .run-prompt.md

      - uses: anthropics/claude-code-base-action@e8132bc5e637a42c27763fc757faa37e1ee43b34
        with:
          prompt_file: .run-prompt.md
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-opus-4-7
          allowed_tools: "Read,Edit,Write,Glob,Grep,WebSearch,WebFetch"
          # The action defaults to a 10-minute internal timeout, which the
          # full manifest sweep + directed pass routinely overruns. Match
          # recipes.yml at 25 min; the job-level timeout-minutes: 30 is the
          # outer ceiling and leaves headroom for the commit/push steps.
          timeout_minutes: "25"

      - name: Commit, push, and notify
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          rm -f .run-prompt.md
          git config user.name "catalog-curator[bot]"
          git config user.email "catalog-curator@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No catalog changes this run."
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          git add -A
          git commit -m "Catalog update ${DATE}"
          # Rebase onto any commits that landed during this run (e.g., the guide agent finishing first)
          git pull --rebase origin main
          git push
          SHA=$(git rev-parse HEAD)

          # Find or create the pinned tracking issue
          ISSUE=$(gh issue list \
            --state open \
            --search 'in:title "Catalog updates"' \
            --json number,title \
            --jq '[.[] | select(.title == "Catalog updates")][0].number')
          if [ -z "${ISSUE}" ] || [ "${ISSUE}" = "null" ]; then
            ISSUE_URL=$(gh issue create \
              --title "Catalog updates" \
              --body "Rolling log of catalog updates. Each scheduled or on-demand run that produced changes posts a comment here.")
            ISSUE="${ISSUE_URL##*/}"
            gh issue pin "${ISSUE}" || true
          fi

          # Extract the top changelog entry (everything from the first '## ' up to the next one)
          LATEST=$(awk '/^## / {n++} n>=2 {exit} n==1 {print}' CHANGELOG.md)

          {
            echo "${LATEST}"
            echo ""
            echo "[View commit](${SERVER_URL}/${REPO}/commit/${SHA})"
          } | gh issue comment "${ISSUE}" --body-file -

      - name: Close user-request issues that shipped this run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          STATE="catalog/curator-state.md"
          [ -f "$STATE" ] || exit 0

          # Extract the (closed this run) block.
          BLOCK=$(awk '
            /^## User requests \(closed this run\)/ { capture=1; next }
            /^## / && capture { exit }
            capture
          ' "$STATE")

          if [ -z "$BLOCK" ] || echo "$BLOCK" | grep -q '^_None\._'; then
            echo "No closed user requests this run."
            exit 0
          fi

          SHA=$(git rev-parse HEAD)
          COMMIT_URL="${SERVER_URL}/${REPO}/commit/${SHA}"
          PAGES_BASE="https://goodb.github.io/sci-ai-enabler"

          # For each line with an issue number, comment and close.
          while IFS= read -r LINE; do
            NUM=$(printf '%s' "$LINE" | grep -oE 'issue=[0-9]+' | head -1 | cut -d= -f2)
            if [ -z "$NUM" ]; then
              # Fallback: try the "[#NN ...]" prefix.
              NUM=$(printf '%s' "$LINE" | grep -oE '\[#[0-9]+' | head -1 | tr -d '[#')
            fi
            [ -z "$NUM" ] && continue
            RESULT=$(printf '%s' "$LINE" | sed -E 's/.*→ //')

            # If the result note names a recipe or tool page, append a direct Pages URL
            # so the user can read the durable answer without clicking through the commit diff.
            PAGE_PATH=$(printf '%s' "$RESULT" | grep -oE '(recipes/items|catalog/tools)/[a-z0-9-]+\.md' | head -1)
            LINK_LINE=""
            if [ -n "$PAGE_PATH" ]; then
              PAGE_URL="${PAGES_BASE}/${PAGE_PATH%.md}.html"
              LINK_LINE=$'\n\nRead the answer here: '"${PAGE_URL}"
            fi

            gh issue comment "$NUM" --repo "$REPO" --body "Shipped in ${COMMIT_URL}. ${RESULT}${LINK_LINE}"$'\n\nClosing — feel free to reopen if this missed the mark.' || true
            gh issue close "$NUM" --repo "$REPO" --reason completed || true
          done <<< "$BLOCK"

          # Reset the (closed this run) section to _None._ and commit.
          python3 - "$STATE" <<'PY'
          import re, pathlib, sys
          path = pathlib.Path(sys.argv[1])
          text = path.read_text()
          pattern = re.compile(
              r"(## User requests \(closed this run\)\n\n)(?:.*?)(\n## |\Z)",
              re.DOTALL,
          )
          new_text, n = pattern.subn(lambda m: m.group(1) + "_None._\n" + m.group(2), text, count=1)
          if n == 1 and new_text != text:
              path.write_text(new_text)
              print("reset (closed this run) to _None._")
          PY

          if ! git diff --quiet "$STATE"; then
            git add "$STATE"
            git commit -m "loop-closed: reset closed-this-run section"
            git pull --rebase origin main
            git push
          fi
